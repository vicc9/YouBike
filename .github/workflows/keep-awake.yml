name: Keep Apps Awake

on:
  schedule:
    # 每 15 分鐘執行一次 (注意：GitHub 伺服器有時會延遲幾分鐘)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        # 請把下面的網址換成你真實的 Streamlit 網址
        run: curl -s https://youbike-lkhtjuvboappdcakhfjk652.streamlit.app/ > /dev/null
        
      - name: Ping Render API
        # 戳一下 API 的健康檢查路徑 (你的 api.py 裡剛好有寫 "/")
        run: curl -s https://youbike-wrfi.onrender.com/ > /dev/null