name: Keep Render Awake

on:
  schedule:
    # 每 10 分鐘執行一次 (注意：GitHub Actions 的 cron 時間是以 UTC 為準)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許你手動在 GitHub 網頁上點擊執行

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        # 替換成你的 Render API 網址
        run: curl -s https://youbike-wrfi.onrender.com/ > /dev/null